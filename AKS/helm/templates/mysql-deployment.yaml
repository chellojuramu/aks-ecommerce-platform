{{- if .Values.mysql.enabled }}
---
{{- if .Values.mysql.auth.useSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mysql.name }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.mysql.name }}
    tier: db
type: Opaque
data:
  {{- if .Values.mysql.auth.existingSecret }}
  # Reference existing secret (created externally)
  {{- else }}
  # Create secret from values (base64 encode the password)
  root-password: {{ .Values.mysql.auth.rootPassword | b64enc | quote }}
  {{- end }}
{{- end }}

---
{{- if .Values.mysql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.mysql.name }}-pvc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.mysql.name }}
    tier: db
spec:
  accessModes:
    - {{ .Values.mysql.persistence.accessMode }}
  storageClassName: {{ .Values.mysql.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.mysql.persistence.size }}
{{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mysql.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.mysql.name }}
    tier: db
spec:
  replicas: {{ .Values.mysql.replicaCount }}
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: {{ .Values.mysql.name }}
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: {{ .Values.mysql.name }}
        tier: db
    spec:
      {{- if .Values.serviceAccount.enabled }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: {{ .Values.mysql.name }}
          image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}
          {{- if .Values.mysql.securityContext.enabled }}
          securityContext:
            capabilities:
              add:
                {{- toYaml .Values.mysql.securityContext.capabilities | nindent 16 }}
          {{- end }}
          ports:
            - name: mysql
              containerPort: {{ .Values.mysql.service.targetPort }}
              protocol: TCP
          env:
            {{- if .Values.mysql.auth.useSecret }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.auth.existingSecret | default (printf "%s-secret" .Values.mysql.name) }}
                  key: {{ .Values.mysql.auth.secretKey }}
            {{- else }}
            # NOT RECOMMENDED: Plain text password (for dev/testing only)
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.mysql.auth.rootPassword | quote }}
            {{- end }}
          {{- if .Values.mysql.persistence.enabled }}
          volumeMounts:
            - name: mysql-data
              mountPath: {{ .Values.mysql.persistence.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.mysql.resources | nindent 12 }}
      {{- if .Values.mysql.persistence.enabled }}
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: {{ .Values.mysql.name }}-pvc
      {{- end }}
      restartPolicy: Always
      {{- with .Values.mysql.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mysql.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mysql.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mysql.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.mysql.name }}
    tier: db
spec:
  type: {{ .Values.mysql.service.type }}
  selector:
    {{- include "roboshop.selectorLabels" . | nindent 4 }}
    component: {{ .Values.mysql.name }}
  ports:
    - name: mysql
      protocol: TCP
      port: {{ .Values.mysql.service.port }}
      targetPort: mysql
{{- end }}