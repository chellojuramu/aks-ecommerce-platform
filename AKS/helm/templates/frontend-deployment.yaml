{{- if .Values.frontend.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.frontend.name }}
    tier: frontend
data:
  nginx.conf: |
    user nginx;
    worker_processes {{ .Values.frontend.nginx.workerProcesses }};
    error_log /var/log/nginx/error.log {{ .Values.frontend.nginx.errorLogLevel }};
    pid /run/nginx.pid;
    include /usr/share/nginx/modules/*.conf;
    
    events {
        worker_connections {{ .Values.frontend.nginx.workerConnections }};
    }
    
    http {
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';
        
        access_log  /var/log/nginx/access.log  main;
        sendfile            on;
        tcp_nopush          on;
        keepalive_timeout   {{ .Values.frontend.nginx.keepaliveTimeout }};
        types_hash_max_size 4096;
        include             /etc/nginx/mime.types;
        default_type        application/octet-stream;
        include /etc/nginx/conf.d/*.conf;
        
        server {
            listen       80;
            listen       [::]:80;
            server_name  _;
            root         /usr/share/nginx/html;
            include /etc/nginx/default.d/*.conf;
            
            error_page 404 /404.html;
            location = /404.html {
            }
            
            error_page 500 502 503 504 /50x.html;
            location = /50x.html {
            }
            
            location /images/ {
              expires {{ .Values.frontend.nginx.imagesCacheExpiry }};
              root   /usr/share/nginx/html;
              try_files $uri /images/placeholder.jpg;
            }
            
            # API Routes - Proxy to backend services
            location /api/catalogue/ { 
              proxy_pass {{ printf "http://%s:%s/" .Values.frontend.routes.catalogue.host .Values.frontend.routes.catalogue.port }};
            }
            
            location /api/user/ { 
              proxy_pass {{ printf "http://%s:%s/" .Values.frontend.routes.user.host .Values.frontend.routes.user.port }};
            }
            
            location /api/cart/ { 
              proxy_pass {{ printf "http://%s:%s/" .Values.frontend.routes.cart.host .Values.frontend.routes.cart.port }};
            }
            
            location /api/shipping/ { 
              proxy_pass {{ printf "http://%s:%s/" .Values.frontend.routes.shipping.host .Values.frontend.routes.shipping.port }};
            }
            
            location /api/payment/ { 
              proxy_pass {{ printf "http://%s:%s/" .Values.frontend.routes.payment.host .Values.frontend.routes.payment.port }};
            }
            
            # Health check endpoint
            location /health {
              stub_status on;
              access_log off;
            }
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.frontend.name }}
    tier: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "roboshop.selectorLabels" . | nindent 6 }}
      component: {{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        {{- include "roboshop.selectorLabels" . | nindent 8 }}
        component: {{ .Values.frontend.name }}
        tier: frontend
      {{- if .Values.frontend.annotations }}
      annotations:
        {{- toYaml .Values.frontend.annotations | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccount.enabled }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Values.frontend.name }}
      containers:
        - name: {{ .Values.frontend.name }}
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          {{- if .Values.frontend.monitoring.enabled }}
          env:
            - name: INSTANA_EUM_KEY
              value: {{ .Values.frontend.monitoring.eumKey | quote }}
            - name: INSTANA_EUM_REPORTING_URL
              value: {{ .Values.frontend.monitoring.eumUrl | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: "/etc/nginx/nginx.conf"
              subPath: nginx.conf
              readOnly: true
          {{- if .Values.frontend.probes.readiness.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.frontend.service.targetPort }}
            initialDelaySeconds: {{ .Values.frontend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontend.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.frontend.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.frontend.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.frontend.probes.liveness.path }}
              port: {{ .Values.frontend.service.targetPort }}
            periodSeconds: {{ .Values.frontend.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.frontend.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      restartPolicy: Always
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.frontend.name }}
    tier: frontend
  {{- if .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml .Values.frontend.service.annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  {{- if and (eq .Values.frontend.service.type "LoadBalancer") .Values.frontend.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.frontend.service.loadBalancerIP }}
  {{- end }}
  selector:
    {{- include "roboshop.selectorLabels" . | nindent 4 }}
    component: {{ .Values.frontend.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      {{- if and (eq .Values.frontend.service.type "NodePort") .Values.frontend.service.nodePort }}
      nodePort: {{ .Values.frontend.service.nodePort }}
      {{- end }}
{{- end }}