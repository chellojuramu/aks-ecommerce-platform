{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.redis.name }}
    tier: db
spec:
  {{- if .Values.redis.headless }}
  clusterIP: None    # Headless service for StatefulSet
  {{- else }}
  type: {{ .Values.redis.service.type }}
  {{- end }}
  selector:
    {{- include "roboshop.selectorLabels" . | nindent 4 }}
    component: {{ .Values.redis.name }}
  ports:
    - name: redis
      protocol: TCP
      port: {{ .Values.redis.service.port }}
      targetPort: redis

---
{{- if .Values.redis.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.redis.name }}
    tier: db
spec:
  serviceName: {{ .Values.redis.name }}    # Required for StatefulSet
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      {{- include "roboshop.selectorLabels" . | nindent 6 }}
      component: {{ .Values.redis.name }}
  template:
    metadata:
      labels:
        {{- include "roboshop.selectorLabels" . | nindent 8 }}
        component: {{ .Values.redis.name }}
        tier: db
    spec:
      {{- if .Values.serviceAccount.enabled }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: {{ .Values.redis.name }}
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.targetPort }}
              protocol: TCP
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.redis.persistence.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
      restartPolicy: Always
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "roboshop.labels" . | nindent 10 }}
          component: {{ .Values.redis.name }}
      spec:
        accessModes:
          - {{ .Values.redis.persistence.accessMode }}
        storageClassName: {{ .Values.redis.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- end }}

{{- else }}
# Deployment mode (simpler, but no stable pod identity)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roboshop.labels" . | nindent 4 }}
    component: {{ .Values.redis.name }}
    tier: db
spec:
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: {{ .Values.redis.name }}
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: {{ .Values.redis.name }}
    spec:
      {{- if .Values.serviceAccount.enabled }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: {{ .Values.redis.name }}
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.targetPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}